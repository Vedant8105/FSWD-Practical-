<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Module</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-container {
    width: 380px;
    height: 550px;
    background: white;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.chat-header {
    background: #4a4aff;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #f5f6fa;
}

.message {
    max-width: 70%;
    padding: 10px 15px;
    margin: 8px 0;
    border-radius: 20px;
    font-size: 14px;
}

.user {
    background: #4a4aff;
    color: white;
    margin-left: auto;
}

.other {
    background: #e4e6eb;
    margin-right: auto;
}

.time {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 3px;
}

.chat-input {
    display: flex;
    border-top: 1px solid #ddd;
}

.chat-input input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
}

.chat-input button {
    padding: 12px;
    border: none;
    background: #4a4aff;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">Chat Module</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function getTime() {
    let now = new Date();
    return now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
}

function addMessage(text, sender) {
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.className = "message " + sender;

    msg.innerHTML = text + '<div class="time">' + getTime() + '</div>';

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function getReply(message) {
    message = message.toLowerCase();

    if (message.includes("hello") || message.includes("hi"))
        return "Hello! How are you doing today?";

    if (message.includes("how are you"))
        return "I'm doing well, thanks. How about you?";

    if (message.includes("thanks"))
        return "You're welcome!";

    if (message.includes("bye"))
        return "Goodbye!";

    let replies = [
        "Got it. I'll check that.",
        "Sounds good.",
        "Okay, noted.",
        "Let me review it.",
        "That makes sense."
    ];

    return replies[Math.floor(Math.random() * replies.length)];
}

function sendMessage() {
    const input = document.getElementById("input");
    let message = input.value.trim();

    if (message === "") return;

    addMessage(message, "user");
    input.value = "";

    setTimeout(() => {
        addMessage("Typing...", "other");

        setTimeout(() => {
            let typingMsg = document.querySelector(".other:last-child");
            if (typingMsg) typingMsg.remove();

            addMessage(getReply(message), "other");
        }, 1000);

    }, 500);
}

document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
